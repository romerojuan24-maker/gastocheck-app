name: secret-scan
# Escaneo automático de secretos (C3A.2). Bloquea PRs/commits que introduzcan credenciales.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo para detectar secretos en commits previos
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Config por defecto detecta JWT/Supabase/AWS/Stripe/etc.
        # Para reglas específicas del repo, añadir .gitleaks.toml en la raíz.
